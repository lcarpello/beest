    <script>
        jokes = ['What do you call a moose with no name? Anonymoose.','Where does a sheep go to get a haircut? The baa baa shop.','What sounds like a sneeze and is made of leather? A shoe.','What do you call a bear with no teeth? A gummy bear.','Did you hear about the broken guitar for sale? It comes with no strings attached.','How do you cook an alligator? With a croc-pot.','Did you hear about the two rowboats that got into an argument? It was an oar-deal.','Why did the car take a nap? It was tired.','Why did the guy get fired from the calendar factory? He took a day off.','Why should you borrow money from pessimists? They never expect to get it back.','What did the pirate say on his birthday? “Aye, matey!”','Why did the cake cross the road? It saw a fork up ahead.','Did you hear about the guy who drank invisible ink? He’s at the hospital waiting to be seen.','Where do most horses live? In neighhh-borhoods!','What did Yoda say when he saw himself in 4k? HDMI.','Can February March? No, but April May!','Why are fish so intelligent? Because they live in schools!','Why did the dinosaur cross the road? Because the chicken wasn’t born yet.','What do Alexander the Great and Kermit the Frog have in common? The same middle name.','How does Spiderman do research? On the World Wide Web!','What did the banana say to the dog? Nothing. Bananas can’t talk.','Why do bowling pins have such a hard life? They’re always getting knocked down.','Did you hear the joke about the roof? Never mind, it would go over your head.','How do billboards talk? Sign language.','Why did the scarecrow win a Nobel prize? Because she was outstanding in her field.','What kind of math do birds love? Owl-gebra!','Why do ducks have feathers on their tails? To cover their butt quacks.','Why did the student eat his homework? Because the teacher told him it was a piece of cake.','What’s a cat’s favorite dessert? A bowl full of mice-cream.','What’s the smartest insect? A spelling bee','Why did Java break up with C? No class','Why did the function cry? It never got called','Why do programmers hate daylight? Too many bugs outside','Why was HTML happy? Well structured','Why did Git get nervous? Merge conflict','Why did the website fail its exam? Too many errors','Why was the keyboard so tired? Too many shifts','Why was the file so confident? It was well compressed','Why don’t programmers like nature? Too many bugs','Why was the laptop cold? Left its Windows open','How do you organize a space party? You planet!','What do you call a nerdy dinosaur? A Thesaurus Rex!','Why was the math book sad? Too many problems!','What do you call a pony with a cough? A little horse.', 'Why did the computer keep sneezing? It caught a virus!', 'Why did the programmer quit his job? Because he didn’t get arrays.', 'There are 10 types of people in the world: those who understand binary, and those who don’t.', 'Why did the programmer go broke? Because he used up all his cache.', 'Why do mathematicians love parks? Because of all the natural logs.', '404: Joke not found… oh wait, here it is!', 'What’s a math teacher’s favorite place? Times Square.', 'Why do astronauts use Linux?  Because you can’t open Windows in space!', 'Your IP adress begins with 192.168', 'Look behind you']
       let hasbeencalled = false;
        function genj (){
            
            if (!hasbeencalled){
            const randomString = jokes[Math.floor(Math.random() * jokes.length)];
            let screenj = document.createElement("h2");
            screenj.textContent = randomString;
            document.body.appendChild(screenj);
            hasbeencalled = !hasbeencalled;
            console.log((hasbeencalled))
            }
            else{
                const h2Elements = document.querySelectorAll('h2');
                h2Elements.forEach(element => element.remove());
                const randomString = jokes[Math.floor(Math.random() * jokes.length)];
                let screenj = document.createElement("h2");
                screenj.textContent = randomString;
                document.body.appendChild(screenj);

            }
