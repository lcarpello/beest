    <script>
        var num1 = document.getElementById("num1");
        var num2 = document.getElementById("num2");

        function sumnum() {
           var total = Number(document.getElementById("num1").value) + Number(document.getElementById("num2").value);
            document.getElementById("total").innerHTML = "THE ANSWER IS: " + total + " IN THE ARABIC NUMERAL SYSTEM";
        }
        function minusnum() {
           var total = Number(document.getElementById("num1").value) - Number(document.getElementById("num2").value);
            document.getElementById("total").innerHTML = "THE ANSWER IS: " + total + " IN THE ARABIC NUMERAL SYSTEM";
        }
        function vatnum() {
           var total = Number(document.getElementById("num1").value) * 1.2;
           total = total / 35;
           total =  "THE ANSWER IS: " + total + " FREDDOS WITH VAT INCLUDED";
            document.getElementById("total").innerHTML = total;
        }
        function salarynum() {
           var total = Number(document.getElementById("num1").value) / 365.25;
           total = total / 20.03;
           total =  "THE ANSWER IS: " + total + " OZZY OZBOURNE RUBBER DUCKS PER DAY";
            document.getElementById("total").innerHTML = total; 
        }
        function interestnum() {
            var percent = Number(document.getElementById("num3").value) / 100;
            var total = Number(document.getElementById("num1").value) * Number(document.getElementById("num2").value) * percent;
            total = total + Number(document.getElementById("num1").value);
            total = total * 172.50;
