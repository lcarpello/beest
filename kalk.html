    <input type="text" id="num2" class="second-input" placeholder="  Enter second number (add, minus, time period)" style="color: black;">

    <button onclick="sumnum()" class="video">add</button>
    <button onclick="minusnum()" class="video">minus</button>
    <button onclick="vatnum()" class="video">apply VAT</button>
    <button onclick="salarynum()" class="video">yearly salary per day</button>
    <button onclick="interestnum()" class="video">interest calculator</button>
    <button onclick="frommiles()" class="video">convert from miles</button>
    <script>
        var num1 = document.getElementById("num1");
        var num2 = document.getElementById("num2");
        var num3 = document.getElementById("num3");

        function sumnum() {
           var total = Number(document.getElementById("num1").value) + Number(document.getElementById("num2").value);
            document.getElementById("total").innerHTML = "THE ANSWER IS: " + total;
        }
        function minusnum() {
           var total = Number(document.getElementById("num1").value) - Number(document.getElementById("num2").value);
            document.getElementById("total").innerHTML = "THE ANSWER IS: " + total;
        }
        function vatnum() {
           var total = Number(document.getElementById("num1").value) * 1.2;
           total = total / 35;
           total =  "THE ANSWER IS: " + total + " freddos with vat included";
            document.getElementById("total").innerHTML = total;
        }
        function salarynum() {
           var total = Number(document.getElementById("num1").value) / 365.25;
           total = total / 20.03;
           total =  "THE ANSWER IS: " + total + " Ozzy Ozbourne rubber ducks per day";
            document.getElementById("total").innerHTML = total; 
        }
        function interestnum() {
            var percent = Number(document.getElementById("num3").value) / 100;
            var total = Number(document.getElementById("num1").value) * Number(document.getElementById("num2").value) * percent;
            total = total + Number(document.getElementById("num1").value);
            total = total * 172.50;
            total =  "THE ANSWER IS: " + total + " in hatian gourdes";
            document.getElementById("total").innerHTML = total;
        }
