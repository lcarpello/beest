<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Liam's crazy calculator</h1>
    <p>HERE TO HELP!</p>
    <input type="text" id="num1" placeholder="Enter first number">
    <input type="text" id="num2" placeholder="Enter second number">
    <button onclick="sumnum()">add</button>
    <button onclick="minusnum()">minus</button>
    <button onclick="vatnum()">apply VAT</button>
    <h2 id="total"></h2>
    <script>
        var num1 = document.getElementById("num1");
        var num2 = document.getElementById("num2");

        function sumnum() {
           var total = Number(document.getElementById("num1").value) + Number(document.getElementById("num2").value);
            document.getElementById("total").innerHTML = total;
        }
        function minusnum() {
           var total = Number(document.getElementById("num1").value) - Number(document.getElementById("num2").value);
            document.getElementById("total").innerHTML = total;
        }
        function vatnum() {
           var total = Number(document.getElementById("num1").value) * 1.2;
           total = total / 35;
           total = total + " freddos with vat included";
            document.getElementById("total").innerHTML = total;
        }
            </script>

</body>
</html>
