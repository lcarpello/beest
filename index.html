    <style>
        @keyframes buttonanimation {
            from {background-color: rgb(255, 0, 0);}
            to {background-color: rgb(0, 234, 255);}
        }
        button {
            height: 100px;
            width: 100px;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            margin-top: 35px;
            transition: width 0.5s, height 0.5s;
            display: flex;  
            flex-direction: row;
            flex-wrap: wrap; 
            position: relative; 
            z-index: 10;
            border-radius: 10px;
            animation-name: buttonanimation;
            animation-duration: 0.5s;
            animation-iteration-count: infinite;

        }
        button:hover {
            width: 200px;
            height: 200px;
            background-color: rgb(90, 44, 130);
        }
        h1, h3{
            color: hsl(0, 100%, 53%);
            background-color: #000000;
            display: table;
            margin: auto;
        }
        
        body {
        margin:0px;
        font-family:'Arial';
        text-align:center;
        background-image: url("lateralus.gif");
        background-repeat: no-repeat;
        background-size: 100% 900%;
        color: #000000;
        }

        #container {
        color:#ff0000;
        text-transform: uppercase;
        font-size:36px;
        font-weight:bold;
        padding-top:200px;  
        position:fixed;
        width:100%;
        bottom:45%;
        display:block;
        position: absolute;
        top: 90px;
        
        }

        #flippinganimationclass {
        height:50px;
        overflow:hidden;
        }

        #flippinganimationclass > div > div {
        color:#ff1010;
        padding:4px 12px;
        height:45px;
        margin-bottom:45px;
        display:inline-block;
        }

        #flippinganimationclass div:first-child {
        animation: show 5s linear infinite;
        }

        #flippinganimationclass div div {
        background:#ffea00;
        }
        #flippinganimationclass div:first-child div {
        background:#15ff00;
        }
        #flippinganimationclass div:last-child div {
        background:#ff8e37;
        }

        @keyframes show {
        0% {margin-top:-270px;}
        5% {margin-top:-180px;}
        33% {margin-top:-180px;}
        38% {margin-top:-90px;}
        66% {margin-top:-90px;}
        71% {margin-top:0px;}
        99.99% {margin-top:0px;}
        100% {margin-top:-270px;}
        }

        p {
        position:fixed;
        width:100%;
        bottom:30px;
        font-size:12px;
        color:#999;
        margin-top:200px;
        }
        .difficult {
            position: absolute;
            top: 600px;
            left: 200px;
        }
